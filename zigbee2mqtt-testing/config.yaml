# https://developers.home-assistant.io/docs/apps/configuration/#app-configuration
name: Zigbee2MQTT Testing
version: "testing"
breaking_versions: []
slug: zigbee2mqtt_testing
description: Testing version of the Zigbee2MQTT app
url: "https://github.com/Nerivec/ha-zigbee2mqtt-testing/tree/main/zigbee2mqtt-testing"
panel_icon: "mdi:test-tube"
arch:
  - aarch64
  - amd64
image: "ghcr.io/nerivec/ha-zigbee2mqtt-testing-{arch}"
init: false
ingress: true
uart: true
udev: true
hassio_api: true
timeout: 30
services:
  - mqtt:need
map:
  - type: "share"
    read_only: false
  - type: homeassistant_config
    read_only: false
    path: /config
  - type: "addon_config"
    read_only: false
    path: "/addon_config"
ports:
  "8099/tcp": null
  "8486/tcp": 8486
options:
  data_path: "/config/zigbee2mqtt-testing"
  socat:
    enabled: false
    master: "pty,raw,echo=0,link=/tmp/ttyZ2M,mode=777"
    slave: "tcp-listen:8485,keepalive,nodelay,reuseaddr,keepidle=1,keepintvl=1,keepcnt=5"
    options: "-d -d"
    log: false
  mqtt: {}
  serial: {}
schema:
  disable_tuya_default_response: "bool?"
  data_path: "str"
  socat:
    enabled: "bool?"
    master: "str?"
    slave: "str?"
    options: "str?"
    log: "bool?"
  mqtt:
    server: "str?"
    ca: "str?"
    key: "str?"
    cert: "str?"
    user: "str?"
    password: "str?"
  serial:
    port: "str?"
    adapter: "match(zstack|deconz|zigate|ezsp|ember|zboss|zoh)?"
    baudrate: "int?"
    rtscts: "bool?"
  watchdog: "str?"
  force_onboarding: "bool?"
